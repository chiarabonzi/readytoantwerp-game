  :root{
    --cream: #FFFFF0;
    --pink: #FF82DC;
    --blue: #5596FF;
    --lime: #D2FF4B;
    --orange: #FF7D3C;
    --ink: #000000;
    --gray: #D9D9D9;
    --coal-red: #FF5C5C;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    width:100%; height:100%;
    background:#1c1c1c;
    overflow:hidden;
    font-family:'PP Editorial New', serif;
  }

  html,body,#page{
    margin:0; padding:0;
    width:100%; height:100%;
    overflow:hidden;
    background:var(--cream);
  }
  #page{
    position:relative;
  }

  #stage{
    position:absolute;
    top:0; left:0;
    width:402px; height:874px;
    background:var(--cream);
    overflow:hidden;
    transform-origin:top left;
    user-select:none;
    touch-action:none;
  }

  /* ---------- TOP BAR ---------- */
  #topbar{
    position:absolute; top:24px; left:0; width:100%; height:32px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 27px;
    z-index:5;
  }

  #avatar{
    width:36px; height:36px; border-radius:50%;
    background:var(--pink);
    border: 1px solid var(--ink);
    flex:0 0 auto;
  }

  .pill{
    border:1px solid var(--ink);
    border-radius:999px;
    height:32px;
    display:flex; align-items:center; justify-content:center;
    padding:0 16px;
    white-space:nowrap;
  }

  #score-pill{ background:var(--blue); gap:5px; }
  #score-pill .label{ font-style:italic; font-size:15px; color:var(--ink); }
  #score-pill .value{ font-style:normal; font-weight:400; font-size:17px; color:var(--ink); min-width:10px; text-align:center; }

  #timer-pill{ background:var(--lime); }
  #timer-pill .value{ font-style:italic; font-size:15px; color:var(--ink); letter-spacing:0.5px; }

  /* ---------- PROGRESS BAR ---------- */
  #progress-track{
    position:absolute; top:70px; left:26px; width:350px; height:8px;
    background:var(--cream);
    border:1px solid var(--ink);
    border-radius:999px;
    overflow:hidden;
    z-index:5;
  }
  #progress-fill{
    height:100%; width:0%;
    background:var(--orange);
  }

  /* ---------- GAME CONTENT WRAPPER (for desaturation) ---------- */
  #game-content{
    position:absolute; inset:0;
    transition: filter 0.4s ease, opacity 0.4s ease;
  }
  #game-content.desaturated{
    filter: grayscale(1) brightness(0.92) contrast(0.95);
  }

  /* ---------- PLAY AREA ---------- */
  #play-area{
    position:absolute;
    top:96px; left:0; width:402px; bottom:0;
    overflow:hidden;
  }

  .falling-obj{
    position:absolute;
    will-change: transform;
    pointer-events:none;
  }
  .falling-obj img{ width:100%; height:100%; display:block; }

  .float-feedback{
    position:absolute;
    font-family:'PP Editorial New', serif;
    font-weight:400; font-size:22px;
    pointer-events:none;
    animation: floatUp 0.7s ease-out forwards;
    z-index:20;
  }
  .float-feedback.good{ color:#2E8B57; }
  .float-feedback.bad{ color:#C23B3B; }
  @keyframes floatUp{
    0%{ transform:translateY(0); opacity:1; }
    100%{ transform:translateY(-40px); opacity:0; }
  }

  #player{
    position:absolute;
    width:128px; height:130px;
    top:0; left:0;
    touch-action:none;
    z-index:10;
  }
  #player img{ width:100%; height:100%; display:block; pointer-events:none; }

  /* ---------- PLAYER ARROWS ---------- */
  .player-arrow{
    position:absolute;
    width:38px; height:32px;
    z-index:5;
    pointer-events:none;
  }
  .player-arrow img{ width:100%; height:100%; display:block; }
  .player-arrow.left{ transform:scaleX(-1); }
  #bottom-placeholder{ display:none; }

  /* ---------- COUNTDOWN OVERLAY ---------- */
  #countdown-overlay{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:50;
    pointer-events:none;
  }
  #countdown-number{
    font-family:'PP Mondwest', monospace;
    font-size:110px;
    color:var(--ink);
    line-height:1;
    transform: scale(0.7);
    opacity:0;
  }
  #countdown-number.show{
    animation: countPulse 0.9s ease-out forwards;
  }
  @keyframes countPulse{
    0%{ transform:scale(0.5); opacity:0; }
    25%{ transform:scale(1.15); opacity:1; }
    45%{ transform:scale(1); opacity:1; }
    80%{ transform:scale(1); opacity:1; }
    100%{ transform:scale(0.9); opacity:0; }
  }

  /* ---------- END SCREEN ---------- */
  #end-screen{
    position:absolute; inset:0;
    background:#FFFFF1;
    z-index:60;
    opacity:0; pointer-events:none;
    transition: opacity 0.4s ease;
  }
  #end-screen.show{ opacity:1; pointer-events:auto; }

</style>
</head>
<body>

<div id="page">
  <div id="stage">

    <div id="game-content" class="desaturated">

      <div id="topbar">
        <div id="avatar"></div>
        <div class="pill" id="score-pill">
          <span class="label">score:</span>
          <span class="value" id="score-value">0</span>
        </div>
        <div class="pill" id="timer-pill">
          <span class="value" id="timer-value">00:00</span>
        </div>
      </div>

      <div id="progress-track"><div id="progress-fill"></div></div>

  };

  const stage = document.getElementById('stage');

  function resizeStage(){
    const vw = window.innerWidth;
    const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const s = vw / 402;
    STAGE_H = Math.round(vh / s);
    PLAY_H = STAGE_H - PLAY_TOP;
    stage.style.height = STAGE_H + 'px';
    stage.style.transform = 'scale(' + s + ')';
    playerY = PLAY_H - PLAYER_BOTTOM_OFFSET - PLAYER_H;
    player.style.top = playerY + 'px';
    const arrowY2 = playerY + PLAYER_H * 0.4;
    arrowLeft.style.top = arrowY2 + 'px';
    arrowRight.style.top = arrowY2 + 'px';
  }
  resizeStage();
  window.addEventListener('resize', resizeStage);
  if(window.visualViewport) window.visualViewport.addEventListener('resize', resizeStage);
  const playArea = document.getElementById('play-area');
  const player = document.getElementById('player');
  const gameContent = document.getElementById('game-content');
  const countdownOverlay = document.getElementById('countdown-overlay');
  const countdownNumber = document.getElementById('countdown-number');
  const scoreValue = document.getElementById('score-value');
  const timerValue = document.getElementById('timer-value');
  const progressFill = document.getElementById('progress-fill');
  const endScreen = document.getElementById('end-screen');

  const STAGE_W = 402;
  const PLAY_TOP = 96;
  let STAGE_H, PLAY_H;
  const MARGIN_X = 16;
  const GAME_DURATION = 60; // seconds

  const PLAYER_W = 128, PLAYER_H = 130;
  const PLAYER_BOTTOM_OFFSET = 20;
  let playerY = 0;

  // catch zone = top portion of the player sprite (the tray)
  const CATCH_ZONE_H = PLAYER_H * 0.30;
  const CATCH_ZONE_INSET = PLAYER_W * 0.10;

  let playerX = (STAGE_W - PLAYER_W) / 2;
  player.style.top = playerY + 'px';
  player.style.left = playerX + 'px';

  const arrowLeft = document.getElementById('arrow-left');
  const arrowRight = document.getElementById('arrow-right');

  const arrowY = playerY + PLAYER_H * 0.4;
  arrowLeft.style.top = arrowY + 'px';
  arrowLeft.style.left = '16px';
  arrowRight.style.top = arrowY + 'px';
  arrowRight.style.right = '16px';

  // ---------------- DRAG CONTROL ----------------
  let dragging = false;
  let dragOffsetX = 0;

  function clampPlayerX(x){
    const min = MARGIN_X;
    const max = STAGE_W - MARGIN_X - PLAYER_W;
    return Math.max(min, Math.min(max, x));
  }

  function pointerToStageX(clientX){
    const rect = stage.getBoundingClientRect();
    const scaleX = STAGE_W / rect.width;
    return (clientX - rect.left) * scaleX;
  }

  function onPointerDown(e){
    if(!gameRunning) return;
    dragging = true;
    const x = pointerToStageX(e.clientX);
    dragOffsetX = x - playerX;
    e.preventDefault();
  }
  function onPointerMove(e){
    if(!dragging) return;
    const x = pointerToStageX(e.clientX);
    playerX = clampPlayerX(x - dragOffsetX);
    player.style.left = playerX + 'px';
    e.preventDefault();
  }
  function onPointerUp(e){
    dragging = false;
  }

  stage.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerUp);

  // ---------------- GAME STATE ----------------
  let gameRunning = false;
  let elapsed = 0;
  let score = 0;
  let lastTimestamp = null;
  let lastSpawn = 0;
  let nextSpawnInterval = 1100;
  let objects = [];
  let objId = 0;
  let rafId = null;
  let lastSpawnX = -1;

  function resetGameState(){
    elapsed = 0;
    score = 0;
    lastSpawn = 0;
    nextSpawnInterval = 1100;
    objects.forEach(o => o.el.remove());
    objects = [];
    scoreValue.textContent = '0';
    timerValue.textContent = '00:00';
    progressFill.style.width = '0%';
    playerX = (STAGE_W - PLAYER_W) / 2;
    player.style.left = playerX + 'px';
  }

  function formatTime(t){
    const m = Math.floor(t/60).toString().padStart(2,'0');
    const s = Math.floor(t%60).toString().padStart(2,'0');
    return m+':'+s;
  }

  function spawnObject(){
    const isCoal = Math.random() < 0.5;
    const type = isCoal ? 'coal' : 'diamond';
    const w = 52 + Math.random()*8;
    const aspect = isCoal ? (346/463) : (421/446);
    const h = w * aspect;
    const range = STAGE_W - 2*MARGIN_X - w;
    let x;
    const minDist = range * 0.4;
    for(let tries = 0; tries < 10; tries++){
      x = MARGIN_X + Math.random() * range;
      if(lastSpawnX < 0 || Math.abs(x - lastSpawnX) >= minDist) break;
    }
    lastSpawnX = x;

    const el = document.createElement('div');
    el.className = 'falling-obj';
    el.style.width = w+'px';
    el.style.height = h+'px';
    el.style.left = x+'px';
    el.style.top = (-h-10)+'px';
    const img = document.createElement('img');
    img.src = ASSETS[type];
    img.draggable = false;
    el.appendChild(img);
    playArea.appendChild(el);

    const progress = Math.min(elapsed / GAME_DURATION, 1);
    const speed = 200 + progress * 80;

    objects.push({ id: objId++, el, x, y: -h-10, w, h, type, speed });
  }

  function showFloatFeedback(x, y, text, good){
    const el = document.createElement('div');
    el.className = 'float-feedback ' + (good ? 'good' : 'bad');
    el.textContent = text;
    el.style.left = x+'px';
    el.style.top = y+'px';
    playArea.appendChild(el);
    setTimeout(()=>el.remove(), 750);
  }

  function checkCatch(o){
    const zoneTop = playerY;
    const zoneBottom = playerY + CATCH_ZONE_H;
    const zoneLeft = playerX + CATCH_ZONE_INSET;
    const zoneRight = playerX + PLAYER_W - CATCH_ZONE_INSET;

    const objBottom = o.y + o.h;
    const objCenterX = o.x + o.w/2;

    if(objBottom >= zoneTop && o.y <= zoneBottom && objCenterX >= zoneLeft && objCenterX <= zoneRight){
      return true;
    }
    return false;
  }

  function update(dt){
    elapsed += dt;
    if(elapsed >= GAME_DURATION){
      elapsed = GAME_DURATION;
      timerValue.textContent = formatTime(elapsed);
      progressFill.style.width = '100%';
      endGame();
      return;
    }
    timerValue.textContent = formatTime(elapsed);
    progressFill.style.width = (elapsed/GAME_DURATION*100)+'%';

    lastSpawn += dt*1000;
    const progress = elapsed / GAME_DURATION;
    nextSpawnInterval = 900 - progress*350;
    if(lastSpawn >= nextSpawnInterval){
      lastSpawn = 0;
      spawnObject();
    }

    for(let i = objects.length - 1; i >= 0; i--){
      const o = objects[i];
      o.y += o.speed * dt;
      o.el.style.top = o.y + 'px';

      if(checkCatch(o)){
        if(o.type === 'diamond'){
          score += 1;
          showFloatFeedback(o.x, playerY - 6, '+1', true);
        } else {
          score -= 1;
          showFloatFeedback(o.x, playerY - 6, '-1', false);
        }
        scoreValue.textContent = score;
        o.el.remove();
        objects.splice(i,1);
        continue;
      }

      if(o.y > PLAY_H + 10){
        o.el.remove();
        objects.splice(i,1);
      }
    }
  }

  function loop(ts){
    if(!gameRunning) return;
    if(lastTimestamp === null) lastTimestamp = ts;
    const dt = Math.min((ts - lastTimestamp)/1000, 0.05);
    lastTimestamp = ts;
    update(dt);
    rafId = requestAnimationFrame(loop);
  }

  function endGame(){
    gameRunning = false;
    if(rafId) cancelAnimationFrame(rafId);
    endScreen.classList.add('show');
  }

  function startCountdown(){
    let count = 3;
    countdownOverlay.style.display = 'flex';
    gameContent.classList.add('desaturated');

    function showNext(){
      if(count > 0){
        countdownNumber.textContent = count;
        countdownNumber.classList.remove('show');
        void countdownNumber.offsetWidth; // restart animation
        countdownNumber.classList.add('show');
        count -= 1;
        setTimeout(showNext, 750);
      } else {
        countdownOverlay.style.display = 'none';
        gameContent.classList.remove('desaturated');
        beginGame();
      }
    }
    showNext();
  }

  function beginGame(){
    resetGameState();
    gameRunning = true;
    lastTimestamp = null;
    rafId = requestAnimationFrame(loop);
  }

  // auto-start the pre-game countdown as soon as the screen loads
  startCountdown();

})();
</script>
